name: Deploy To Azure Static Web Apps

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AZURE_RESOURCE_GROUP: cus-cuddlecubdaycare-rg
  AZURE_STATIC_WEB_APP_NAME: cuddlecubdaycare

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get deployment token
        id: swa_token
        run: |
          az extension add --name staticwebapp --yes
          TOKEN="$(az staticwebapp secrets list \
            --name "$AZURE_STATIC_WEB_APP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --query "properties.apiKey" \
            --output tsv)"
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Prepare website files
        run: |
          rm -rf dist
          mkdir -p dist/assets

          cp index.html styles.css script.js staticwebapp.config.json dist/
          cp assets/cuddle-cub-logo.png dist/assets/
          cp assets/hero-daycare.png dist/assets/
          cp assets/rosy-dhiman.jpeg dist/assets/

          if [ -f assets/hero-video.mp4 ]; then
            cp assets/hero-video.mp4 dist/assets/
          fi

      - name: Deploy website files
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.swa_token.outputs.token }}
          action: upload
          app_location: dist
          skip_app_build: true

      - name: Show website URL
        run: |
          HOSTNAME="$(az staticwebapp show \
            --name "$AZURE_STATIC_WEB_APP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --query "defaultHostname" \
            --output tsv)"
          echo "https://$HOSTNAME"
